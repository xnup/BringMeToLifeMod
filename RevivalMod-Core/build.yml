name: Build RevivalMod

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build RevivalMod.csproj -c Release

      - name: Upload DLL
        uses: actions/upload-artifact@v4
        with:
          name: RevivalMod-Build
          path: |
            **/bin/Release/**/*.dll
